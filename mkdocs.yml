site_name: MusicKit
site_description: Convert messy audio rips into a clean tagged library; play locally or stream over Tailscale via a Subsonic-compatible server.
site_url: https://winterop-com.github.io/musickit
repo_url: https://github.com/winterop-com/musickit
repo_name: winterop-com/musickit

theme:
  name: material
  # Dark-only — claude-theme is a dark-mode overlay and looks broken
  # under the light palette, so we drop the toggle entirely.
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    # Left-side nav (no top tabs). `navigation.sections` groups top-level
    # entries; `navigation.expand` keeps the tree expanded by default so
    # everything is one click away. `navigation.indexes` lets a folder's
    # index.md act as the section landing page.
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Quickstart: guides/quickstart.md
  - Commands:
      - convert: guides/convert.md
      - library: guides/library.md
      - inspect: guides/inspect.md
      - tui: guides/tui.md
      - serve: guides/serve.md
      - playlist: guides/playlist.md
  - Reference:
      - Architecture: architecture.md
      - Edge cases: edge-cases.md
      - API: api-reference.md
  - Project:
      - Development: guides/development.md
      - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  - claude-theme
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_object_full_path: false
            show_category_heading: true
            members_order: source
            heading_level: 2
