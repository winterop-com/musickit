{% extends "base.html" %}
{% block title %}Sign in — MusicKit{% endblock %}
{% block body %}
<main class="login-shell">
  <h1 class="login-brand">MusicKit</h1>
  <form method="post" action="/login" class="login-form">
    <input type="hidden" name="csrf" value="{{ csrf }}">
    <label>
      <span>Username</span>
      <input type="text" name="username" autocomplete="username" required autofocus>
    </label>
    <label>
      <span>Password</span>
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    {% if error %}<p class="login-error">{{ error }}</p>{% endif %}
    <button type="submit">Sign in</button>
  </form>
  <p class="login-hint">Same credentials as the Subsonic API. CLI / mobile clients are unaffected.</p>
</main>
{% endblock %}
