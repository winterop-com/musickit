<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicKit</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="_palette.css">
  <link rel="stylesheet" href="shell.css">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="js/app.js"></script>
  <!-- Visualizer is loaded as a classic script (IIFE) and wires itself
       to #audio + #viz-canvas when both exist on the page. Because
       it's deferred, it runs after the SPA's app.js has populated
       the shell DOM with the canvas. -->
  <script defer src="js/visualizer.js"></script>
  <!-- Cmd/Ctrl+P command palette. Self-contained IIFE that wires itself
       to the palette DOM rendered by `shell.js`'s `renderShell()`. `defer`
       so it runs after app.js has populated the shell, and after any
       login-only render no-ops gracefully (the palette DOM doesn't exist
       on the picker page). -->
  <script defer src="js/palette.js"></script>
</body>
</html>
